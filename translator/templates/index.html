<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Django Tarjimon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .main-card { max-width: 600px; margin: 50px auto; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card main-card shadow p-4">
            <h2 class="text-center mb-4 text-primary">Tarjimon PRO</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Matnni kiriting:</label>
                    <textarea name="text" class="form-control" rows="4">{{ original }}</textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Qaysi tilga:</label>
                    <select name="lang" class="form-select">
                        <option value="uz" {% if lang == 'uz' %}selected{% endif %}>O'zbekcha</option>
                        <option value="en" {% if lang == 'en' %}selected{% endif %}>Inglizcha</option>
                        <option value="ru" {% if lang == 'ru' %}selected{% endif %}>Ruscha</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">Tarjima qilish</button>
            </form>

            {% if translated %}
            <div class="mt-4 p-3 bg-light border rounded">
                <h5 class="text-muted">Natija:</h5>
                <p class="fs-5">{{ translated }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
