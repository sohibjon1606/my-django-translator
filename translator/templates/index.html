<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="7pses4nPlPxbqpIa7A7BQzBUIvfPnM92ARztB3JTsN8" />
    <title>SMB Translator - Onlayn Tarjimon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        .main-card { max-width: 650px; margin: 30px auto; border-radius: 15px; border: none; }
        body.dark-mode { background: #121212; color: #e0e0e0; }
        .dark-mode .card { background: #1e1e1e; color: white; border: 1px solid #333; }
        .dark-mode .form-control, .dark-mode .form-select { background: #2d2d2d; color: white; border-color: #444; }
        .dark-mode .bg-light { background: #2d2d2d !important; color: #bbb; }
        .dark-mode .list-group-item { background: #1e1e1e; color: #ddd; border-color: #333; }
        .fa-beat { animation: fa-beat 1s infinite linear; }
        @keyframes fa-beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card main-card shadow-lg p-4">
            <button onclick="toggleDarkMode()" class="btn btn-outline-secondary btn-sm float-end" id="modeBtn">
                <i class="fas fa-moon"></i> Tun
            </button>
            <h2 class="text-center mb-4 text-primary"><i class="fas fa-language"></i> SMB Translator</h2>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3 position-relative">
                    <label class="form-label fw-bold">Matnni kiriting:</label>
                    <textarea name="text" id="inputText" class="form-control" rows="4" placeholder="Gapiring yoki yozing...">{{ original }}</textarea>
                    <button type="button" onclick="startDictation()" class="btn btn-outline-primary btn-sm position-absolute" style="bottom: 10px; right: 10px; border-radius: 50%;">
                        <i class="fas fa-microphone" id="micIcon"></i>
                    </button>
                </div>
                
                <div class="mb-3">
                    <select name="lang" class="form-select">
                        <option value="uz" {% if lang == 'uz' %}selected{% endif %}>O'zbekcha</option>
                        <option value="en" {% if lang == 'en' %}selected{% endif %}>Inglizcha</option>
                        <option value="ru" {% if lang == 'ru' %}selected{% endif %}>Ruscha</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Tarjima qilish</button>
            </form>

            {% if translated %}
            <div class="mt-4 p-3 bg-light border rounded">
                <h6 class="small text-muted">NATIJA:</h6>
                <p id="resultText" class="fs-5">{{ translated }}</p>
                <button onclick="speakText()" class="btn btn-outline-success btn-sm"><i class="fas fa-volume-up"></i></button>
                <button onclick="copyText()" class="btn btn-outline-secondary btn-sm"><i class="fas fa-copy"></i></button>
                <span id="copyMsg" class="text-success small ms-2" style="display: none;">Nusxalandi!</span>
            </div>
            {% endif %}

            <div class="mt-5">
                <h6 class="text-muted mb-3"><i class="fas fa-history"></i> Tarix:</h6>
                <div class="list-group list-group-flush">
                    {% for item in history %}
                    <div class="list-group-item d-flex justify-content-between align-items-center bg-transparent px-0">
                        <span class="small text-truncate" style="max-width: 150px;">{{ item.original_text }}</span>
                        <i class="fas fa-arrow-right text-primary small"></i>
                        <span class="small fw-bold text-truncate" style="max-width: 150px;">{{ item.translated_text }}</span>
                        <span class="badge bg-secondary">{{ item.language }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('modeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i> Kun' : '<i class="fas fa-moon"></i> Tun';
        }
        if (localStorage.getItem('darkMode') === 'true') { toggleDarkMode(); }

        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                var recognition = new webkitSpeechRecognition();
                recognition.lang = "uz-UZ";
                recognition.start();
                document.getElementById('micIcon').classList.add('text-danger', 'fa-beat');
                recognition.onresult = function(e) {
                    document.getElementById('inputText').value = e.results[0][0].transcript;
                    recognition.stop();
                    document.getElementById('micIcon').classList.remove('text-danger', 'fa-beat');
                };
            }
        }

        function speakText() {
            const utterance = new SpeechSynthesisUtterance(document.getElementById('resultText').innerText);
            utterance.lang = "{{ lang }}" === 'uz' ? 'tr-TR' : ("{{ lang }}" === 'ru' ? 'ru-RU' : 'en-US');
            window.speechSynthesis.speak(utterance);
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('resultText').innerText);
            document.getElementById('copyMsg').style.display = 'inline';
            setTimeout(() => { document.getElementById('copyMsg').style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
